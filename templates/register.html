{% extends "base.html" %}

{% block title %}Register - Student Placement Tracker{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-box">
        <h2>Student Registration</h2>
        
        <!-- Display error messages if any -->
        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <!-- Registration form -->
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required placeholder="Your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required placeholder="At least 6 characters">
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password:</label>
                <input type="password" id="confirm_password" name="confirm_password" required placeholder="Confirm your password">
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
        </form>

        <!-- Link to login page -->
        <p class="auth-link">
            Already have an account? <a href="{{ request.url_for('login_form') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
