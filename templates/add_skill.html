{% extends "base.html" %}

{% block title %}Add Skill - Student Placement Tracker{% endblock %}

{% block content %}
<div class="form-container">
    <div class="form-box">
        <h2>🎯 Add New Skill</h2>
        
        <!-- Display error messages if any -->
        {% if error %}
            <div class="alert alert-danger">
                {{ error }}
            </div>
        {% endif %}

        <!-- Add skill form -->
        <form method="POST" class="form-content">
            <div class="form-group">
                <label for="skill_name">Skill Name:</label>
                <input type="text" id="skill_name" name="skill_name" required placeholder="e.g., Python, Java, React, etc.">
                <small>Enter the name of a technical skill you possess</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Skill</button>
                <a href="{{ request.url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
